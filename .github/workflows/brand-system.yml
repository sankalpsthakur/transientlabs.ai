name: Brand System

on:
  push:
    paths:
      - 'public/brand/**'
      - 'public/site.webmanifest'
      - 'scripts/ci/check-brand-assets.mjs'
      - 'src/app/layout.tsx'
      - 'src/app/page.tsx'
      - 'src/components/brand/**'
      - 'src/components/layout/Header.tsx'
      - 'src/components/layout/Footer.tsx'
      - 'src/lib/site-brand.ts'
      - 'tests/brand-system.spec.ts'
      - '.github/workflows/brand-system.yml'
  pull_request:
    paths:
      - 'public/brand/**'
      - 'public/site.webmanifest'
      - 'scripts/ci/check-brand-assets.mjs'
      - 'src/app/layout.tsx'
      - 'src/app/page.tsx'
      - 'src/components/brand/**'
      - 'src/components/layout/Header.tsx'
      - 'src/components/layout/Footer.tsx'
      - 'src/lib/site-brand.ts'
      - 'tests/brand-system.spec.ts'
      - '.github/workflows/brand-system.yml'
  workflow_dispatch:

jobs:
  brand:
    name: Brand readiness
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check brand assets
        run: node scripts/ci/check-brand-assets.mjs

      - name: Build the app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start the app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/transient-brand.log 2>&1 &
          echo $! > /tmp/transient-brand.pid

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          cat /tmp/transient-brand.log
          exit 1

      - name: Run brand Playwright spec
        run: npx playwright test tests/brand-system.spec.ts
